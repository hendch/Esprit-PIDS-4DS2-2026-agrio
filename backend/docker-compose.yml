services:
  postgres:
    image: postgres:15
    container_name: agrio_postgres
    environment:
      POSTGRES_USER: agrio
      POSTGRES_PASSWORD: agrio123
      POSTGRES_DB: agrio_db
    ports:
      - "5432:5432"
    volumes:
      - agrio_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrio -d agrio_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  agrio_pgdata:
